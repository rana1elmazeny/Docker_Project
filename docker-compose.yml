version: "3.9"

services:

  flask1:
    build: .
    container_name: flask1
    env_file:
      - .env
    environment:
      - SERVER_NAME=flask1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flask2:
    build: .
    container_name: flask2
    env_file:
      - .env
    environment:
      - SERVER_NAME=flask2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD","pg_isready","-U","$POSTGRES_USER"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
      - "4443:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./static:/static
    depends_on:
      - flask1
      - flask2

volumes:
  pgdata:
